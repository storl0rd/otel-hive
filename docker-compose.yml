services:
  otel-hive:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: otel-hive
    ports:
      - "8080:8080"    # HTTP API + UI
      - "4320:4320"    # OpAMP WebSocket
      - "2345:2345"    # Delve debugger (dev only)
    volumes:
      - ./cmd:/app/cmd
      - ./internal:/app/internal
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./otel-hive.yaml:/app/otel-hive.yaml
      - otel-hive-data:/app/data
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    environment:
      - GIN_MODE=debug
      - CGO_ENABLED=1
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - otel-hive-network

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: otel-hive-ui
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://localhost:8080
    depends_on:
      - otel-hive
    networks:
      - otel-hive-network
    restart: unless-stopped

  # Demo collector with OpAMP Supervisor — connects to otel-hive on startup
  supervisor:
    build:
      context: ./examples/supervisor
      dockerfile: Dockerfile
    container_name: demo-supervisor
    depends_on:
      - otel-hive
    networks:
      - otel-hive-network
    restart: unless-stopped

volumes:
  otel-hive-data:
    driver: local
  go-build-cache:
    driver: local
  go-mod-cache:
    driver: local

networks:
  otel-hive-network:
    driver: bridge
